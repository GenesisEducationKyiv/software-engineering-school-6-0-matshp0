services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: github_notifier_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d github_notifier_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit-test:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"
      - "8026:8025"
